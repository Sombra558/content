<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SC Content QA Viewer</title>
  <style>
    :root{
      --bg:#f4efe6;--card:#ffffff;--muted:#6d6a68;--accent:#176b63;--accent-2:#c35a2e;--line:rgba(31,26,23,0.06)
    }
    *{box-sizing:border-box}
    body{font-family:Inter,system-ui,Arial,Helvetica,sans-serif;margin:0;background:linear-gradient(180deg,#fbf6ef,#f0e7db);color:#1f1a17;-webkit-font-smoothing:antialiased}
    .wrap{display:grid;grid-template-columns:340px 1fr;gap:22px;padding:26px;max-width:1400px;margin:0 auto}
    .panel{background:var(--card);padding:18px;border-radius:14px;border:1px solid var(--line);box-shadow:0 8px 30px rgba(31,26,23,0.06)}
    h2{margin:0 0 8px;font-size:1.25rem}
    .list{height:78vh;overflow:auto;padding-right:6px}
    .slides{height:78vh;overflow:auto;padding:18px}
    .section{cursor:pointer;padding:12px;border-radius:10px;margin-bottom:8px;border:1px solid transparent}
    .section:hover{background:#fbfbfb;border-color:rgba(23,107,99,0.06)}
    .section.active{background:linear-gradient(90deg,rgba(23,107,99,0.06),rgba(195,90,46,0.03));border-color:rgba(23,107,99,0.12)}
    .section strong{display:block;font-size:0.98rem}
    .meta{font-size:0.9rem;color:var(--muted);margin-top:6px}
    .controls{display:flex;gap:10px;margin-bottom:14px;align-items:center}
    .controls.stack{flex-direction:column;align-items:stretch}
    .btn{padding:8px 12px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--muted);cursor:pointer}
    .btn.active{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border-color:transparent;box-shadow:0 8px 20px rgba(23,107,99,0.12)}
    .search{flex:1;padding:10px;border:1px solid var(--line);border-radius:10px}
    .toolbar{display:flex;justify-content:space-between;gap:12px;align-items:center;margin:8px 0 16px;flex-wrap:wrap}
    .statline{font-size:.9rem;color:var(--muted)}
    .slide-nav{display:flex;gap:8px;align-items:center}
    .slide{border-radius:12px;padding:14px;margin-bottom:14px;background:linear-gradient(180deg,#fff,#fffaf7);border:1px solid var(--line);box-shadow:0 6px 18px rgba(31,26,23,0.04)}
    .slide strong{display:block;margin-bottom:8px}
    .slide p{margin:0 0 10px;line-height:1.6;color:#2b2b2b}
    .content-block{padding:14px 0;border-top:1px solid var(--line)}
    .content-block:first-of-type{border-top:0;padding-top:6px}
    .content-label{font-size:.82rem;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em}
    .instruction{padding:10px 12px;border-radius:10px;background:#f7f4ee;color:#514b46;margin:10px 0 12px}
    .flow{padding:12px;border-radius:10px;background:#fcfaf7;border:1px solid var(--line);margin:10px 0}
    .flow-item{padding:10px 12px;border-radius:10px;background:#fff;border:1px solid var(--line);margin-top:8px}
    .flow-item-title{font-weight:700}
    .bullets{margin:0;padding-left:18px}
    .bullets li{margin:0 0 8px;line-height:1.55}
    .empty{padding:18px;border:1px dashed var(--line);border-radius:12px;color:var(--muted);background:#fcfaf7}
    pre{white-space:pre-wrap;background:#fbf8f5;padding:12px;border-radius:10px;border:1px solid var(--line)}
    @media(max-width:980px){.wrap{grid-template-columns:1fr;padding:12px}.list{height:auto}.slides{height:auto}}
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="panel">
      <h2>SC Content QA</h2>
      <div class="controls">
        <button id="langEn" class="btn active">EN</button>
        <button id="langEs" class="btn">ES</button>
        <input id="search" class="search" placeholder="search..." />
      </div>
      <div class="list" id="sectionList"></div>
    </aside>
    <main class="panel slides">
      <div class="meta" id="courseMeta">Loading...</div>
      <h3 id="sectionTitle"></h3>
      <div id="slides"></div>
    </main>
  </div>

  <script>
    const state={lang:'en',data:{en:null,es:null},selectedSection:0,query:''};
    const sectionList=document.getElementById('sectionList');
    const slidesEl=document.getElementById('slides');
    const sectionTitle=document.getElementById('sectionTitle');
    const courseMeta=document.getElementById('courseMeta');
    const searchInput=document.getElementById('search');

    document.getElementById('langEn').addEventListener('click',()=>{state.lang='en';state.selectedSection=0;render();toggleLangButtons()});
    document.getElementById('langEs').addEventListener('click',()=>{state.lang='es';state.selectedSection=0;render();toggleLangButtons()});
    searchInput.addEventListener('input',(e)=>{state.query=e.target.value.toLowerCase();renderSections();renderSlides()});

    function toggleLangButtons(){document.getElementById('langEn').classList.toggle('active',state.lang==='en');document.getElementById('langEs').classList.toggle('active',state.lang==='es')}

    function getCourse(){return state.data[state.lang]?.courses?.[0]||null}
    function getSections(){return getCourse()?.sections||[]}

    function renderSections(){
      const sections=getSections();
      if(!sections.length){sectionList.innerHTML='<div class="meta">No sections found</div>';return}
      sectionList.innerHTML='';
      sections.forEach((s,i)=>{
        const text=JSON.stringify(s).toLowerCase();
        if(state.query && !text.includes(state.query)) return;
        const el=document.createElement('div');el.className='section'+(i===state.selectedSection?' active':'');el.innerHTML=`<strong>${s.title||'Section '+s.order_index}</strong><div class="meta">${(s.slides?.length||0)} slides</div>`;
        el.addEventListener('click',()=>{state.selectedSection=i;render();});
        sectionList.appendChild(el);
      })
    }

    function getVisibleSlides(section){
      return (section?.slides||[]).filter(slide=>{
        if(!state.query) return true;
        return JSON.stringify(slide).toLowerCase().includes(state.query);
      });
    }

    function renderSlides(){
      const sections=getSections();
      const sec=sections[state.selectedSection]||sections[0];
      if(!sec){slidesEl.innerHTML='<div class="empty">No slides</div>';sectionTitle.textContent='';return}
      sectionTitle.textContent=sec.title||('Section '+sec.order_index);
      const slides=getVisibleSlides(sec);
      if(!slides.length){slidesEl.innerHTML='<div class="empty">No slides match this search.</div>';return}
      const cards=slides.map((slide)=>{
        const body=(slide.contents||[]).map(renderContentBlock).join('');
        return `
          <div class="slide">
            <div><strong>Slide ${slide.order_index} — ${escapeHtml(slide.content_type||'Content')}</strong></div>
            ${body}
          </div>
        `;
      }).join('');
      slidesEl.innerHTML=`
        <div class="toolbar">
          <div class="statline">Section ${sec.order_index} · ${slides.length} matching slides</div>
          <div class="statline">All visible slides rendered below</div>
        </div>
        ${cards}
      `;
    }

    function render(){
      const course=getCourse();
      courseMeta.textContent=course?`${course.name} · ${course.state} · ${course.duration_minutes} min`:'No course loaded';
      renderSections();
      renderSlides();
    }

    function renderContentBlock(content){
      const parts=[];
      const label=content.content_type || content.text?.content_type || `content ${content.order_index ?? ''}`;

      if(content.text && content.text.body){
        parts.push(`<p>${escapeHtml(content.text.body)}</p>`);
      }

      if(content.text && Array.isArray(content.text.bullet_points)){
        parts.push(`<ul class="bullets">${content.text.bullet_points.map(item=>`<li>${escapeHtml(item)}</li>`).join('')}</ul>`);
      }

      if(content.text && Array.isArray(content.text.paragraphs)){
        parts.push(content.text.paragraphs.map(text=>`<p>${escapeHtml(text)}</p>`).join(''));
      }

      if(content.text && (content.text.instruction || content.text.instruction_text)){
        parts.push(`<div class="instruction">${escapeHtml(content.text.instruction || content.text.instruction_text)}</div>`);
      }

      if(content.interactive){
        const interactiveParts=[];
        if(content.interactive.question){
          interactiveParts.push(`<p><strong>${escapeHtml(content.interactive.question)}</strong></p>`);
        }
        if(Array.isArray(content.interactive.content_structure)){
          interactiveParts.push(content.interactive.content_structure.map(text=>`<p>${escapeHtml(text)}</p>`).join(''));
        }
        if(Array.isArray(content.interactive.reveal_items) && content.interactive.reveal_items.length){
          interactiveParts.push(`
            <div class="flow">
              <strong>Reveal items</strong>
              ${content.interactive.reveal_items.map(item=>`
                <div class="flow-item">
                  <div class="flow-item-title">${escapeHtml(item.title || item.id || 'Item')}</div>
                  <div>${escapeHtml(item.revealed_text || '')}</div>
                </div>
              `).join('')}
            </div>
          `);
        }
        if(Array.isArray(content.interactive.options) && content.interactive.options.length){
          interactiveParts.push(`
            <div class="flow">
              <strong>Options</strong>
              ${content.interactive.options.map(option=>`
                <div class="flow-item">
                  <div class="flow-item-title">${escapeHtml(option.label || option.id || 'Option')}</div>
                  ${option.feedback ? `<div>${escapeHtml(option.feedback)}</div>` : ''}
                </div>
              `).join('')}
            </div>
          `);
        }
        if(content.interactive.correct){
          interactiveParts.push(`<div class="instruction"><strong>Correct:</strong> ${escapeHtml(content.interactive.correct)}</div>`);
        }
        parts.push(interactiveParts.join(''));
      }

      if(typeof content.text === 'string'){
        parts.push(`<pre>${escapeHtml(content.text)}</pre>`);
      }

      if(!parts.length){
        parts.push(`<pre>${escapeHtml(JSON.stringify(content, null, 2))}</pre>`);
      }

      return `<div class="content-block"><div class="content-label">${escapeHtml(label)}</div>${parts.join('')}</div>`;
    }

    function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

    async function load(){
      try{
        const [en,es]=await Promise.all([fetch('sc-content/sc-content.en.json').then(r=>r.json()),fetch('sc-content/sc-content.es.json').then(r=>r.json())]);
        state.data.en=en;state.data.es=es;render();
      }catch(e){courseMeta.textContent='Error loading JSON: '+e.message}
    }

    load();
  </script>
</body>
</html>
